<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔺 認識形狀 🔺</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Comic Sans MS", "Microsoft JhengHei", "PingFang TC", "Trebuchet MS", sans-serif;
    background: linear-gradient(160deg, #d7f0d2 0%, #b6e3ac 100%);
    color: #1f4d23;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }
  .card {
    background: #f3fbf0;
    border: 6px solid #4caf50;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(31, 77, 35, 0.25);
    padding: 36px 32px 40px;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }
  h1 { font-size: 34px; color: #2e7d32; margin-bottom: 6px; }
  .subtitle { font-size: 16px; color: #4f7a52; margin-bottom: 20px; }

  .scoreboard {
    display: flex;
    justify-content: space-around;
    background: #e2f4dd;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 20px;
    font-size: 20px;
    font-weight: bold;
  }
  .scoreboard span { color: #1b5e20; font-size: 26px; }

  .prompt { font-size: 26px; font-weight: bold; color: #1b5e20; margin-bottom: 8px; }
  .shape-stage {
    display: flex; align-items: center; justify-content: center;
    height: 200px; margin-bottom: 22px;
  }
  .shape-stage svg { width: 180px; height: 180px; }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .opt {
    font-size: 32px;
    font-weight: bold;
    font-family: inherit;
    padding: 20px 0;
    border: none;
    border-radius: 20px;
    background: #66bb6a;
    color: #ffffff;
    cursor: pointer;
    box-shadow: 0 6px 0 #43a047;
    transition: transform 0.08s, background 0.15s;
  }
  .opt:hover { background: #57a95b; }
  .opt:active { transform: translateY(4px); box-shadow: 0 2px 0 #43a047; }
  .opt.correct { background: #2e7d32 !important; }
  .opt.wrong { background: #e57373 !important; box-shadow: 0 6px 0 #c62828; }

  .feedback {
    font-size: 30px;
    font-weight: bold;
    margin-top: 22px;
    min-height: 38px;
  }
  .feedback.good { color: #2e7d32; }
  .feedback.bad { color: #c62828; }

  .nav {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 22px;
  }
  .nav-btn {
    flex: 1;
    font-size: 22px;
    font-family: inherit;
    font-weight: bold;
    padding: 14px 0;
    border: none;
    border-radius: 16px;
    background: #43a047;
    color: #ffffff;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform 0.08s;
  }
  .nav-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .nav-btn:disabled {
    background: #c8e6c9;
    color: #94b897;
    box-shadow: 0 5px 0 #aed5b0;
    cursor: not-allowed;
  }

  .start-overlay {
    position: fixed;
    inset: 0;
    background: rgba(27, 94, 32, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    color: #fff;
    text-align: center;
    padding: 20px;
  }
  .start-overlay h2 { font-size: 40px; margin-bottom: 14px; }
  .start-overlay p { font-size: 18px; max-width: 420px; margin-bottom: 28px; line-height: 1.5; }
  .start-btn {
    font-size: 32px;
    font-family: inherit;
    font-weight: bold;
    padding: 18px 50px;
    border: none;
    border-radius: 50px;
    background: #ffeb3b;
    color: #1b5e20;
    cursor: pointer;
    box-shadow: 0 8px 0 #fbc02d;
  }
  .start-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #fbc02d; }

  .home-link {
    position: fixed; top: 14px; left: 14px; z-index: 50;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 18px; font-weight: bold;
    text-decoration: none;
    padding: 10px 18px; border-radius: 30px;
    background: #ffffff; color: #2e7d32;
    border: 3px solid #4caf50;
    box-shadow: 0 4px 0 #43a047;
  }
  .home-link:active { transform: translateY(3px); box-shadow: 0 1px 0 #43a047; }
</style>
</head>
<body>

<a class="home-link" href="math.html">⬅️ 返回數學</a>

<div class="start-overlay" id="startOverlay">
  <h2>🔺 形狀大發現 🔺</h2>
  <p>小朋友，看看圖案，<b>說出它是什麼形狀</b>！<br>
  一共有 10 題喔。</p>
  <button class="start-btn" id="startBtn">出發！🚀</button>
</div>

<div class="card">
  <h1>🔺 認識形狀 🔺</h1>
  <div class="subtitle">看圖形，認出它的名字</div>

  <div class="scoreboard">
    <div>⭐ 分數<br><span id="score">0</span></div>
    <div>🎯 題目<br><span id="qnum">1</span>/10</div>
    <div>🔥 連續答對<br><span id="streak">0</span></div>
  </div>

  <div class="prompt">這是什麼形狀？</div>
  <div class="shape-stage" id="stage"></div>

  <div class="options" id="options">
    <button class="opt"></button>
    <button class="opt"></button>
    <button class="opt"></button>
    <button class="opt"></button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn">⬅️ 上一題</button>
    <button class="nav-btn" id="nextBtn">下一題 ➡️</button>
  </div>
</div>

<script>
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

/* ---------------- Shapes ---------------- */
// Each shape: Chinese name + an SVG inner markup builder that takes a fill colour.
const SHAPES = [
  { name: '圓形',   svg: c => `<circle cx="100" cy="100" r="72" fill="${c}"/>` },
  { name: '正方形', svg: c => `<rect x="32" y="32" width="136" height="136" rx="8" fill="${c}"/>` },
  { name: '長方形', svg: c => `<rect x="18" y="58" width="164" height="84" rx="8" fill="${c}"/>` },
  { name: '三角形', svg: c => `<polygon points="100,24 176,172 24,172" fill="${c}"/>` },
  { name: '星形',   svg: c => `<polygon points="100,25 117.6,75.7 171.3,76.8 128.5,109.3 144.1,160.7 100,130 55.9,160.7 71.5,109.3 28.7,76.8 82.4,75.7" fill="${c}"/>` },
  { name: '心形',   svg: c => `<path d="M100,178 C40,128 20,92 20,66 C20,42 40,26 64,26 C82,26 95,37 100,52 C105,37 118,26 136,26 C160,26 180,42 180,66 C180,92 160,128 100,178 Z" fill="${c}"/>` },
  { name: '橢圓形', svg: c => `<ellipse cx="100" cy="100" rx="82" ry="54" fill="${c}"/>` },
  { name: '菱形',   svg: c => `<polygon points="100,20 178,100 100,180 22,100" fill="${c}"/>` }
];
const COLORS = ['#ef5350', '#42a5f5', '#ffca28', '#ab47bc', '#26a69a', '#ff7043', '#5c6bc0', '#ec407a'];

function makeQuestion() {
  const idx = randInt(0, SHAPES.length - 1);
  const color = COLORS[randInt(0, COLORS.length - 1)];
  return { shapeIdx: idx, answer: SHAPES[idx].name, color };
}

// Three distractor names + the correct one, shuffled
function makeOptions(correctName) {
  const opts = new Set([correctName]);
  while (opts.size < 4) {
    opts.add(SHAPES[randInt(0, SHAPES.length - 1)].name);
  }
  const arr = [...opts];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---------------- Game state ---------------- */
const TOTAL = 10;
let qIndex = 0;
let quiz = [];
let answers = [];

const stageEl = document.getElementById('stage');
const optsEl = document.getElementById('options');
const optButtons = optsEl.querySelectorAll('.opt');
const feedbackEl = document.getElementById('feedback');
const scoreEl = document.getElementById('score');
const qnumEl = document.getElementById('qnum');
const streakEl = document.getElementById('streak');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function buildQuiz() {
  quiz = [];
  answers = [];
  for (let i = 0; i < TOTAL; i++) {
    const q = makeQuestion();
    q.options = makeOptions(q.answer);
    quiz.push(q);
    answers.push(null);
  }
  qIndex = 0;
}

function computeStats() {
  let score = 0, streak = 0;
  for (let i = 0; i < TOTAL; i++) {
    if (answers[i] == null) continue;
    if (answers[i] === quiz[i].answer) { score++; streak++; }
    else streak = 0;
  }
  return { score, streak };
}

function updateScoreboard() {
  const { score, streak } = computeStats();
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  qnumEl.textContent = qIndex + 1;
}

function renderQuestion() {
  const cur = quiz[qIndex];
  const picked = answers[qIndex];
  const answered = picked != null;

  stageEl.innerHTML = `<svg viewBox="0 0 200 200">${SHAPES[cur.shapeIdx].svg(cur.color)}</svg>`;

  optButtons.forEach((btn, i) => {
    const val = cur.options[i];
    btn.textContent = val;
    btn.className = 'opt';
    btn.disabled = answered;
    if (answered) {
      if (val === cur.answer) btn.classList.add('correct');
      else if (val === picked) btn.classList.add('wrong');
    }
  });

  if (answered) {
    if (picked === cur.answer) {
      feedbackEl.textContent = '✅ 答對了！好棒！';
      feedbackEl.className = 'feedback good';
    } else {
      feedbackEl.textContent = '❌ 這是「' + cur.answer + '」';
      feedbackEl.className = 'feedback bad';
    }
  } else {
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
  }

  updateScoreboard();
  updateNav();
}

function updateNav() {
  prevBtn.disabled = (qIndex === 0);
  if (qIndex === TOTAL - 1) {
    nextBtn.textContent = '完成 🏁';
    nextBtn.disabled = false;
  } else {
    nextBtn.textContent = '下一題 ➡️';
    nextBtn.disabled = false;
  }
}

function choose(btn) {
  if (answers[qIndex] != null) return;
  answers[qIndex] = btn.textContent;

  if (btn.textContent === quiz[qIndex].answer) playDing();
  else playBuzz();

  renderQuestion();
}

function goPrev() {
  if (qIndex > 0) { qIndex--; renderQuestion(); }
}

function goNext() {
  if (qIndex < TOTAL - 1) { qIndex++; renderQuestion(); }
  else endGame();
}

function endGame() {
  const { score } = computeStats();
  stageEl.innerHTML = '<div style="font-size:64px;font-weight:bold;color:#1b5e20;">🎉 ' + score + ' / ' + TOTAL + ' 🎉</div>';
  document.querySelector('.prompt').style.display = 'none';
  optsEl.style.display = 'none';
  document.querySelector('.nav').style.display = 'none';
  let msg;
  if (score === TOTAL) msg = '🏆 太完美了！形狀小達人！';
  else if (score >= 7) msg = '🌟 表現超棒，繼續加油！';
  else if (score >= 4) msg = '👍 很努力喔！再挑戰一次吧！';
  else msg = '💪 多多練習，你一定做得到！';
  feedbackEl.textContent = msg;
  feedbackEl.className = 'feedback good';

  const again = document.createElement('button');
  again.className = 'start-btn';
  again.style.marginTop = '20px';
  again.textContent = '再玩一次 🔄';
  again.onclick = () => location.reload();
  feedbackEl.after(again);
}

optButtons.forEach(btn => btn.addEventListener('click', () => choose(btn)));
prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);

/* ---------------- Audio ---------------- */
let audioCtx = null;
function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function note(freq, start, dur, type = 'triangle', vol = 0.18) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = type;
  osc.frequency.value = freq;
  filter.type = 'lowpass';
  filter.frequency.value = 1400;
  filter.Q.value = 0.7;
  const attack = 0.04, release = Math.min(0.3, dur * 0.6);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(vol, start + attack);
  gain.gain.setValueAtTime(vol, start + Math.max(attack, dur - release));
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  osc.connect(filter).connect(gain).connect(audioCtx.destination);
  osc.start(start);
  osc.stop(start + dur + 0.05);
}
const F = { C5:523.3, E4:329.6 };
function playDing() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  note(F.C5, t, 0.12, 'triangle', 0.2);
  note(F.E4 * 2, t + 0.1, 0.18, 'triangle', 0.2);
}
function playBuzz() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  note(110, t, 0.3, 'sawtooth', 0.18);
}

/* ---------------- Start ---------------- */
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startOverlay').style.display = 'none';
  ensureCtx();
  buildQuiz();
  renderQuestion();
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
<script src="counter.js"></script>
</body>
</html>
