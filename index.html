<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 每日小測驗 🌿</title>
<link rel="stylesheet" href="fonts.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 18px; }
  body {
    font-family: "Comic Sans MS", "Microsoft JhengHei", "PingFang TC", "Trebuchet MS", sans-serif;
    background: linear-gradient(160deg, #d7f0d2 0%, #b6e3ac 100%);
    color: #1f4d23;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }
  .card {
    background: #f3fbf0;
    border: 6px solid #4caf50;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(31, 77, 35, 0.25);
    padding: 40px 32px 44px;
    width: 100%;
    max-width: 600px;
    text-align: center;
  }
  .mascot {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 6px;
    animation: bounce 1.6s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  h1 {
    font-size: 44px;
    color: #2e7d32;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 20px;
    color: #4f7a52;
    margin-bottom: 32px;
  }

  /* Big tappable subject links */
  .menu {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .quiz-link {
    display: flex;
    align-items: center;
    gap: 18px;
    text-align: left;
    text-decoration: none;
    font-size: 30px;
    font-weight: bold;
    padding: 22px 26px;
    border-radius: 22px;
    background: #66bb6a;
    color: #ffffff;
    box-shadow: 0 6px 0 #43a047;
    transition: transform 0.08s, background 0.15s;
  }
  .quiz-link:hover { background: #57a95b; }
  .quiz-link:active { transform: translateY(4px); box-shadow: 0 2px 0 #43a047; }
  .quiz-link .emoji { font-size: 46px; line-height: 1; }
  .quiz-link .label { display: flex; flex-direction: column; flex: 1; }
  .quiz-link .label small {
    font-size: 17px;
    font-weight: normal;
    opacity: 0.92;
    margin-top: 2px;
  }
  .quiz-link .arrow { font-size: 30px; opacity: 0.85; }

  /* Carrot-orange variant for the reward link */
  .quiz-link.reward {
    background: #ff9233;
    box-shadow: 0 6px 0 #e07a1f;
  }
  .quiz-link.reward:hover { background: #f5851f; }
  .quiz-link.reward:active { box-shadow: 0 2px 0 #e07a1f; }

  /* Separator before the reward link */
  .section-title {
    margin: 34px 0 16px;
    font-size: 22px;
    font-weight: bold;
    color: #b5651d;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .section-title::before,
  .section-title::after {
    content: "";
    flex: 1;
    height: 3px;
    border-radius: 3px;
    background: #e0c9a6;
  }

  .notice {
    margin-bottom: 18px;
    color: #b5651d;
    font-size: 17px;
    font-weight: bold;
    line-height: 1.5;
  }

  .footer {
    margin-top: 18px;
    font-size: 16px;
    color: #6a8d6d;
  }
</style>
</head>
<body>

<div class="card">
  <div class="notice">🌈 這個網站不會有廣告，永遠免費給大家使用！🌈</div>
  <div class="mascot">🐰</div>
  <h1>🌿 每日小測驗 🌿</h1>
  <div class="subtitle">先選一個科目吧！🥕</div>

  <!-- Level 1: subjects. Each links to that subject's page (Level 2). -->
  <nav class="menu">
    <a class="quiz-link" href="chinese.html">
      <span class="emoji">📖</span>
      <span class="label">國語<small>注音・認字・造詞</small></span>
      <span class="arrow">➡️</span>
    </a>
    <a class="quiz-link" href="english.html">
      <span class="emoji">🔤</span>
      <span class="label">英文<small>English spelling &amp; words</small></span>
      <span class="arrow">➡️</span>
    </a>
    <a class="quiz-link" href="math.html">
      <span class="emoji">🧮</span>
      <span class="label">數學<small>加減・時鐘・形狀・乘法</small></span>
      <span class="arrow">➡️</span>
    </a>
  </nav>

  <div class="section-title">🥕 獎勵 🥕</div>
  <nav class="menu">
    <a class="quiz-link reward" href="https://good-kid-score-app.vercel.app/" target="_blank" rel="noopener">
      <span class="emoji">⭐</span>
      <span class="label">乖寶寶積分<small>記錄紅蘿蔔，看看你有多棒！</small></span>
    </a>
  </nav>

  <div class="footer">🌱 玩得開心，繼續加油學習！🌱</div>
</div>

<script>
  /* Disable right-click */
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
<script src="counter.js"></script>
</body>
</html>
