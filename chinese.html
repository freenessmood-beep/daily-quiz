<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 國語 📖</title>
<link rel="stylesheet" href="fonts.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 18px; }
  body {
    font-family: "Comic Sans MS", "Microsoft JhengHei", "PingFang TC", "Trebuchet MS", sans-serif;
    background: linear-gradient(160deg, #d7f0d2 0%, #b6e3ac 100%);
    color: #1f4d23;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }
  .card {
    background: #f3fbf0;
    border: 6px solid #4caf50;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(31, 77, 35, 0.25);
    padding: 40px 32px 44px;
    width: 100%;
    max-width: 600px;
    text-align: center;
  }
  .mascot { font-size: 72px; line-height: 1; margin-bottom: 6px; }
  h1 { font-size: 40px; color: #2e7d32; margin-bottom: 8px; }
  .subtitle { font-size: 19px; color: #4f7a52; margin-bottom: 30px; }

  .menu { display: flex; flex-direction: column; gap: 20px; }
  .quiz-link {
    display: flex;
    align-items: center;
    gap: 18px;
    text-align: left;
    text-decoration: none;
    font-size: 28px;
    font-weight: bold;
    padding: 22px 26px;
    border-radius: 22px;
    background: #66bb6a;
    color: #ffffff;
    box-shadow: 0 6px 0 #43a047;
    transition: transform 0.08s, background 0.15s;
  }
  .quiz-link:hover { background: #57a95b; }
  .quiz-link:active { transform: translateY(4px); box-shadow: 0 2px 0 #43a047; }
  .quiz-link .emoji { font-size: 44px; line-height: 1; }
  .quiz-link .label { display: flex; flex-direction: column; flex: 1; }
  .quiz-link .label small {
    font-size: 16px; font-weight: normal; opacity: 0.92; margin-top: 2px;
  }

  .home-link {
    position: fixed; top: 14px; left: 14px; z-index: 50;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 18px; font-weight: bold;
    text-decoration: none;
    padding: 10px 18px; border-radius: 30px;
    background: #ffffff; color: #2e7d32;
    border: 3px solid #4caf50;
    box-shadow: 0 4px 0 #43a047;
  }
  .home-link:active { transform: translateY(3px); box-shadow: 0 1px 0 #43a047; }
</style>
</head>
<body>

<a class="home-link" href="index.html">🏠 回首頁</a>

<div class="card">
  <div class="mascot">📖</div>
  <h1>國語</h1>
  <div class="subtitle">選一個國語遊戲！🥕</div>

  <!-- To add a Chinese quiz, copy one <a class="quiz-link"> block below. -->
  <nav class="menu">
    <a class="quiz-link" href="chinese-quiz.html">
      <span class="emoji">🐰</span>
      <span class="label">小兔子認字樂園<small>注音・部首・造詞 認字練習</small></span>
    </a>
  </nav>
</div>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
<script src="counter.js"></script>
</body>
</html>
