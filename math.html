<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 Math Mission 🌿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    background: linear-gradient(160deg, #d7f0d2 0%, #b6e3ac 100%);
    color: #1f4d23;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }
  .card {
    background: #f3fbf0;
    border: 6px solid #4caf50;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(31, 77, 35, 0.25);
    padding: 36px 32px 40px;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }
  h1 {
    font-size: 34px;
    color: #2e7d32;
    margin-bottom: 6px;
  }
  .subtitle { font-size: 16px; color: #4f7a52; margin-bottom: 20px; }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    justify-content: space-around;
    background: #e2f4dd;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 24px;
    font-size: 20px;
    font-weight: bold;
  }
  .scoreboard span { color: #1b5e20; font-size: 26px; }

  /* Question */
  .question {
    font-size: 86px;
    font-weight: bold;
    color: #1b5e20;
    letter-spacing: 4px;
    margin: 18px 0 28px;
    line-height: 1.1;
  }
  .blank {
    display: inline-block;
    min-width: 110px;
    border-bottom: 8px solid #66bb6a;
    color: #2e7d32;
  }

  /* Answer buttons */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .opt {
    font-size: 52px;
    font-weight: bold;
    font-family: inherit;
    padding: 20px 0;
    border: none;
    border-radius: 20px;
    background: #66bb6a;
    color: #ffffff;
    cursor: pointer;
    box-shadow: 0 6px 0 #43a047;
    transition: transform 0.08s, background 0.15s;
  }
  .opt:hover { background: #57a95b; }
  .opt:active { transform: translateY(4px); box-shadow: 0 2px 0 #43a047; }
  .opt.correct { background: #2e7d32 !important; }
  .opt.wrong { background: #e57373 !important; box-shadow: 0 6px 0 #c62828; }

  /* Feedback */
  .feedback {
    font-size: 30px;
    font-weight: bold;
    margin-top: 22px;
    min-height: 38px;
  }
  .feedback.good { color: #2e7d32; }
  .feedback.bad { color: #c62828; }

  /* Navigation */
  .nav {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 22px;
  }
  .nav-btn {
    flex: 1;
    font-size: 22px;
    font-family: inherit;
    font-weight: bold;
    padding: 14px 0;
    border: none;
    border-radius: 16px;
    background: #43a047;
    color: #ffffff;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform 0.08s;
  }
  .nav-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .nav-btn:disabled {
    background: #c8e6c9;
    color: #94b897;
    box-shadow: 0 5px 0 #aed5b0;
    cursor: not-allowed;
  }

  .start-overlay {
    position: fixed;
    inset: 0;
    background: rgba(27, 94, 32, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    color: #fff;
    text-align: center;
    padding: 20px;
  }
  .start-overlay h2 { font-size: 40px; margin-bottom: 14px; }
  .start-overlay p { font-size: 18px; max-width: 420px; margin-bottom: 28px; line-height: 1.5; }
  .start-btn {
    font-size: 32px;
    font-family: inherit;
    font-weight: bold;
    padding: 18px 50px;
    border: none;
    border-radius: 50px;
    background: #ffeb3b;
    color: #1b5e20;
    cursor: pointer;
    box-shadow: 0 8px 0 #fbc02d;
  }
  .start-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #fbc02d; }

  /* Back to home */
  .home-link {
    position: fixed; top: 14px; left: 14px; z-index: 50;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 18px; font-weight: bold;
    text-decoration: none;
    padding: 10px 18px; border-radius: 30px;
    background: #ffffff; color: #2e7d32;
    border: 3px solid #4caf50;
    box-shadow: 0 4px 0 #43a047;
  }
  .home-link:active { transform: translateY(3px); box-shadow: 0 1px 0 #43a047; }
</style>
</head>
<body>

<a class="home-link" href="index.html">🏠 Home</a>

<div class="start-overlay" id="startOverlay">
  <h2>🕶️ Your Mission 🕶️</h2>
  <p>Agent, your mission is to solve <b>10 secret math codes</b>!<br>
  Tap the right answer before time runs out.</p>
  <button class="start-btn" id="startBtn">GO! 🚀</button>
</div>

<div class="card">
  <h1>🌿 Math Mission 🌿</h1>
  <div class="subtitle">Add &amp; Subtract — Grade 1 Secret Agent</div>

  <div class="scoreboard">
    <div>⭐ Score<br><span id="score">0</span></div>
    <div>🎯 Question<br><span id="qnum">1</span>/10</div>
    <div>🔥 Streak<br><span id="streak">0</span></div>
  </div>

  <div class="question" id="question">3 + 2 = <span class="blank">?</span></div>

  <div class="options" id="options">
    <button class="opt"></button>
    <button class="opt"></button>
    <button class="opt"></button>
    <button class="opt"></button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn">⬅️ Previous</button>
    <button class="nav-btn" id="nextBtn">Next ➡️</button>
  </div>
</div>

<script>
/* ---------------- Math question generator ---------------- */
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function makeQuestion() {
  let a, b, op, answer;
  if (Math.random() < 0.5) {
    // Addition, sum at most 50
    a = randInt(1, 25);
    b = randInt(1, 50 - a);   // ensures a + b <= 50
    op = '+';
    answer = a + b;
  } else {
    // Subtraction, never negative, numbers at most 50
    a = randInt(2, 50);
    b = randInt(1, a);        // ensures a - b >= 0
    op = '-';
    answer = a - b;
  }
  return { a, b, op, answer };
}

// Build 3 distractor answers near the correct one
function makeOptions(correct) {
  const opts = new Set([correct]);
  while (opts.size < 4) {
    let delta = randInt(-9, 9);
    let cand = correct + delta;
    if (cand >= 0 && cand <= 50) opts.add(cand);
  }
  const arr = [...opts];
  // shuffle
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---------------- Game state ---------------- */
const TOTAL = 10;
let qIndex = 0;
let quiz = [];        // pre-generated questions: {a, op, b, answer, options}
let answers = [];     // the value the player picked for each question (null = not answered)

const qEl = document.getElementById('question');
const optsEl = document.getElementById('options');
const optButtons = optsEl.querySelectorAll('.opt');
const feedbackEl = document.getElementById('feedback');
const scoreEl = document.getElementById('score');
const qnumEl = document.getElementById('qnum');
const streakEl = document.getElementById('streak');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

// Generate the whole quiz up front so we can navigate back and forth
function buildQuiz() {
  quiz = [];
  answers = [];
  for (let i = 0; i < TOTAL; i++) {
    const q = makeQuestion();
    q.options = makeOptions(q.answer);
    quiz.push(q);
    answers.push(null);
  }
  qIndex = 0;
}

// Recompute score + current streak from stored answers (so it stays correct when navigating)
function computeStats() {
  let score = 0, streak = 0;
  for (let i = 0; i < TOTAL; i++) {
    if (answers[i] == null) continue;
    if (answers[i] === quiz[i].answer) { score++; streak++; }
    else streak = 0;
  }
  return { score, streak };
}

function updateScoreboard() {
  const { score, streak } = computeStats();
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  qnumEl.textContent = qIndex + 1;
}

// Draw the current question and reflect whether it has already been answered
function renderQuestion() {
  const cur = quiz[qIndex];
  const picked = answers[qIndex];          // null if not answered yet
  const answered = picked != null;

  qEl.innerHTML = cur.a + ' ' + cur.op + ' ' + cur.b + ' = <span class="blank">?</span>';

  optButtons.forEach((btn, i) => {
    const val = cur.options[i];
    btn.textContent = val;
    btn.className = 'opt';
    btn.disabled = answered;               // lock once answered
    if (answered) {
      if (val === cur.answer) btn.classList.add('correct');
      else if (val === picked) btn.classList.add('wrong');
    }
  });

  // Feedback text for an already-answered question
  if (answered) {
    if (picked === cur.answer) {
      feedbackEl.textContent = '✅ Mission point! Great job!';
      feedbackEl.className = 'feedback good';
    } else {
      feedbackEl.textContent = '❌ The code was ' + cur.answer;
      feedbackEl.className = 'feedback bad';
    }
  } else {
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
  }

  updateScoreboard();
  updateNav();
}

function updateNav() {
  prevBtn.disabled = (qIndex === 0);
  if (qIndex === TOTAL - 1) {
    nextBtn.textContent = 'Finish 🏁';
    nextBtn.disabled = false;
  } else {
    nextBtn.textContent = 'Next ➡️';
    nextBtn.disabled = false;
  }
}

function choose(btn) {
  if (answers[qIndex] != null) return;     // already answered — can't change
  const picked = parseInt(btn.textContent, 10);
  answers[qIndex] = picked;

  if (picked === quiz[qIndex].answer) playDing();
  else playBuzz();

  renderQuestion();                        // re-render to show locked/answered state
}

function goPrev() {
  if (qIndex > 0) { qIndex--; renderQuestion(); }
}

function goNext() {
  if (qIndex < TOTAL - 1) { qIndex++; renderQuestion(); }
  else endGame();
}

function endGame() {
  const { score } = computeStats();
  qEl.innerHTML = '🎉 ' + score + ' / ' + TOTAL + ' 🎉';
  optsEl.style.display = 'none';
  document.querySelector('.nav').style.display = 'none';
  let msg;
  if (score === TOTAL) msg = '🏆 Perfect! Mission Accomplished, Agent!';
  else if (score >= 7) msg = '🌟 Awesome work, super agent!';
  else if (score >= 4) msg = '👍 Good effort! Try again!';
  else msg = '💪 Keep practicing, you can do it!';
  feedbackEl.textContent = msg;
  feedbackEl.className = 'feedback good';

  const again = document.createElement('button');
  again.className = 'start-btn';
  again.style.marginTop = '20px';
  again.textContent = 'Play Again 🔄';
  again.onclick = () => location.reload();
  feedbackEl.after(again);
}

optButtons.forEach(btn => btn.addEventListener('click', () => choose(btn)));
prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);

/* ---------------- Audio: Web Audio API (sound effects only) ---------------- */
let audioCtx = null;

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// Simple note player — warm, soft tone (filtered, gentle attack/release)
function note(freq, start, dur, type = 'triangle', vol = 0.18) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = type;
  osc.frequency.value = freq;
  // Low-pass filter rolls off harsh digital overtones for a mellower sound
  filter.type = 'lowpass';
  filter.frequency.value = 1400;
  filter.Q.value = 0.7;
  const attack = 0.04, release = Math.min(0.3, dur * 0.6);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(vol, start + attack);
  gain.gain.setValueAtTime(vol, start + Math.max(attack, dur - release));
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  osc.connect(filter).connect(gain).connect(audioCtx.destination);
  osc.start(start);
  osc.stop(start + dur + 0.05);
}

// Note frequencies
const F = { G3:196.0, A3:220.0, Bb3:233.1, C4:261.6, D4:293.7, Eb4:311.1, E4:329.6,
            F4:349.2, G4:392.0, Ab4:415.3, A4:440.0, Bb4:466.2, C5:523.3, D5:587.3, Eb5:622.3 };

// Feedback sounds
function playDing() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  note(F.C5, t, 0.12, 'triangle', 0.2);
  note(F.E4 * 2, t + 0.1, 0.18, 'triangle', 0.2);
}
function playBuzz() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  note(110, t, 0.3, 'sawtooth', 0.18);
}

/* ---------------- Start ---------------- */
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startOverlay').style.display = 'none';
  ensureCtx();
  buildQuiz();
  renderQuestion();
});

/* ---------------- Disable right-click ---------------- */
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
