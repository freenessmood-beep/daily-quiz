<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕐 認識時鐘 🕐</title>
<link rel="stylesheet" href="fonts.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Comic Sans MS", "Microsoft JhengHei", "PingFang TC", "Trebuchet MS", sans-serif;
    background: linear-gradient(160deg, #d7f0d2 0%, #b6e3ac 100%);
    color: #1f4d23;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    user-select: none;
  }
  .card {
    background: #f3fbf0;
    border: 6px solid #4caf50;
    border-radius: 28px;
    box-shadow: 0 12px 30px rgba(31, 77, 35, 0.25);
    padding: 36px 32px 40px;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }
  h1 { font-size: 34px; color: #2e7d32; margin-bottom: 6px; }
  .subtitle { font-size: 16px; color: #4f7a52; margin-bottom: 20px; }

  .scoreboard {
    display: flex;
    justify-content: space-around;
    background: #e2f4dd;
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 20px;
    font-size: 20px;
    font-weight: bold;
  }
  .scoreboard span { color: #1b5e20; font-size: 26px; }

  .prompt { font-size: 26px; font-weight: bold; color: #1b5e20; margin-bottom: 8px; }
  .clock-stage {
    display: flex; align-items: center; justify-content: center;
    height: 220px; margin-bottom: 22px;
  }
  .clock-stage svg { width: 210px; height: 210px; }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .opt {
    font-size: 34px;
    font-weight: bold;
    font-family: inherit;
    padding: 20px 0;
    border: none;
    border-radius: 20px;
    background: #66bb6a;
    color: #ffffff;
    cursor: pointer;
    box-shadow: 0 6px 0 #43a047;
    transition: transform 0.08s, background 0.15s;
  }
  .opt:hover { background: #57a95b; }
  .opt:active { transform: translateY(4px); box-shadow: 0 2px 0 #43a047; }
  .opt.correct { background: #2e7d32 !important; }
  .opt.wrong { background: #e57373 !important; box-shadow: 0 6px 0 #c62828; }

  .feedback {
    font-size: 30px;
    font-weight: bold;
    margin-top: 22px;
    min-height: 38px;
  }
  .feedback.good { color: #2e7d32; }
  .feedback.bad { color: #c62828; }

  .nav {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 22px;
  }
  .nav-btn {
    flex: 1;
    font-size: 22px;
    font-family: inherit;
    font-weight: bold;
    padding: 14px 0;
    border: none;
    border-radius: 16px;
    background: #43a047;
    color: #ffffff;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform 0.08s;
  }
  .nav-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .nav-btn:disabled {
    background: #c8e6c9;
    color: #94b897;
    box-shadow: 0 5px 0 #aed5b0;
    cursor: not-allowed;
  }

  .start-overlay {
    position: fixed;
    inset: 0;
    background: rgba(27, 94, 32, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    color: #fff;
    text-align: center;
    padding: 20px;
  }
  .start-overlay h2 { font-size: 40px; margin-bottom: 14px; }
  .start-overlay p { font-size: 18px; max-width: 420px; margin-bottom: 28px; line-height: 1.5; }
  .start-btn {
    font-size: 32px;
    font-family: inherit;
    font-weight: bold;
    padding: 18px 50px;
    border: none;
    border-radius: 50px;
    background: #ffeb3b;
    color: #1b5e20;
    cursor: pointer;
    box-shadow: 0 8px 0 #fbc02d;
  }
  .start-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #fbc02d; }

  .home-link {
    position: fixed; top: 14px; left: 14px; z-index: 50;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit; font-size: 18px; font-weight: bold;
    text-decoration: none;
    padding: 10px 18px; border-radius: 30px;
    background: #ffffff; color: #2e7d32;
    border: 3px solid #4caf50;
    box-shadow: 0 4px 0 #43a047;
  }
  .home-link:active { transform: translateY(3px); box-shadow: 0 1px 0 #43a047; }
</style>
</head>
<body>

<a class="home-link" href="math.html">⬅️ 返回數學</a>

<div class="start-overlay" id="startOverlay">
  <h2>🕐 時鐘小老師 🕐</h2>
  <p>小朋友，看看時鐘的指針，<b>說出現在幾點</b>！<br>
  短針是「點」，長針是「分」。一共 10 題。</p>
  <button class="start-btn" id="startBtn">出發！🚀</button>
</div>

<div class="card">
  <h1>🕐 認識時鐘 🕐</h1>
  <div class="subtitle">看時鐘，說出現在幾點</div>

  <div class="scoreboard">
    <div>⭐ 分數<br><span id="score">0</span></div>
    <div>🎯 題目<br><span id="qnum">1</span>/10</div>
    <div>🔥 連續答對<br><span id="streak">0</span></div>
  </div>

  <div class="prompt">現在幾點？</div>
  <div class="clock-stage" id="stage"></div>

  <div class="options" id="options">
    <button class="opt"></button>
    <button class="opt"></button>
    <button class="opt"></button>
    <button class="opt"></button>
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="nav">
    <button class="nav-btn" id="prevBtn">⬅️ 上一題</button>
    <button class="nav-btn" id="nextBtn">下一題 ➡️</button>
  </div>
</div>

<script>
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

/* ---------------- Clock drawing ---------------- */
// Build an analog clock SVG showing hour h (1-12) and minute m (0 or 30).
function clockSVG(h, m) {
  const cx = 100, cy = 100;
  // Numbers 1..12 around the face
  let nums = '';
  for (let i = 1; i <= 12; i++) {
    const a = i * 30 * Math.PI / 180;
    const x = cx + 76 * Math.sin(a);
    const y = cy - 76 * Math.cos(a);
    nums += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="bold" fill="#2e7d32">${i}</text>`;
  }
  // Hand angles (clockwise from 12 o'clock)
  const hAng = ((h % 12) + m / 60) * 30 * Math.PI / 180;
  const mAng = (m * 6) * Math.PI / 180;
  const hx = cx + 48 * Math.sin(hAng), hy = cy - 48 * Math.cos(hAng);
  const mx = cx + 70 * Math.sin(mAng), my = cy - 70 * Math.cos(mAng);
  return `<svg viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="92" fill="#ffffff" stroke="#4caf50" stroke-width="6"/>
    ${nums}
    <line x1="100" y1="100" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#1b5e20" stroke-width="8" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="${mx.toFixed(1)}" y2="${my.toFixed(1)}" stroke="#ef5350" stroke-width="5" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="6" fill="#1b5e20"/>
  </svg>`;
}

// Kid-friendly Chinese time label: "3 點" or "3 點半"
function timeLabel(h, m) {
  return m === 0 ? (h + ' 點') : (h + ' 點半');
}

function makeQuestion() {
  const h = randInt(1, 12);
  const m = Math.random() < 0.5 ? 0 : 30;
  return { h, m, answer: timeLabel(h, m) };
}

// Three distractor times + the correct one, shuffled
function makeOptions(correct) {
  const opts = new Set([correct]);
  let guard = 0;
  while (opts.size < 4 && guard++ < 100) {
    const h = randInt(1, 12);
    const m = Math.random() < 0.5 ? 0 : 30;
    opts.add(timeLabel(h, m));
  }
  const arr = [...opts];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ---------------- Game state ---------------- */
const TOTAL = 10;
let qIndex = 0;
let quiz = [];
let answers = [];

const stageEl = document.getElementById('stage');
const optsEl = document.getElementById('options');
const optButtons = optsEl.querySelectorAll('.opt');
const feedbackEl = document.getElementById('feedback');
const scoreEl = document.getElementById('score');
const qnumEl = document.getElementById('qnum');
const streakEl = document.getElementById('streak');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function buildQuiz() {
  quiz = [];
  answers = [];
  for (let i = 0; i < TOTAL; i++) {
    const q = makeQuestion();
    q.options = makeOptions(q.answer);
    quiz.push(q);
    answers.push(null);
  }
  qIndex = 0;
}

function computeStats() {
  let score = 0, streak = 0;
  for (let i = 0; i < TOTAL; i++) {
    if (answers[i] == null) continue;
    if (answers[i] === quiz[i].answer) { score++; streak++; }
    else streak = 0;
  }
  return { score, streak };
}

function updateScoreboard() {
  const { score, streak } = computeStats();
  scoreEl.textContent = score;
  streakEl.textContent = streak;
  qnumEl.textContent = qIndex + 1;
}

function renderQuestion() {
  const cur = quiz[qIndex];
  const picked = answers[qIndex];
  const answered = picked != null;

  stageEl.innerHTML = clockSVG(cur.h, cur.m);

  optButtons.forEach((btn, i) => {
    const val = cur.options[i];
    btn.textContent = val;
    btn.className = 'opt';
    btn.disabled = answered;
    if (answered) {
      if (val === cur.answer) btn.classList.add('correct');
      else if (val === picked) btn.classList.add('wrong');
    }
  });

  if (answered) {
    if (picked === cur.answer) {
      feedbackEl.textContent = '✅ 答對了！好棒！';
      feedbackEl.className = 'feedback good';
    } else {
      feedbackEl.textContent = '❌ 現在是「' + cur.answer + '」';
      feedbackEl.className = 'feedback bad';
    }
  } else {
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
  }

  updateScoreboard();
  updateNav();
}

function updateNav() {
  prevBtn.disabled = (qIndex === 0);
  if (qIndex === TOTAL - 1) {
    nextBtn.textContent = '完成 🏁';
    nextBtn.disabled = false;
  } else {
    nextBtn.textContent = '下一題 ➡️';
    nextBtn.disabled = false;
  }
}

function choose(btn) {
  if (answers[qIndex] != null) return;
  answers[qIndex] = btn.textContent;

  if (btn.textContent === quiz[qIndex].answer) playDing();
  else playBuzz();

  renderQuestion();
}

function goPrev() {
  if (qIndex > 0) { qIndex--; renderQuestion(); }
}

function goNext() {
  if (qIndex < TOTAL - 1) { qIndex++; renderQuestion(); }
  else endGame();
}

function endGame() {
  const { score } = computeStats();
  stageEl.innerHTML = '<div style="font-size:64px;font-weight:bold;color:#1b5e20;">🎉 ' + score + ' / ' + TOTAL + ' 🎉</div>';
  document.querySelector('.prompt').style.display = 'none';
  optsEl.style.display = 'none';
  document.querySelector('.nav').style.display = 'none';
  let msg;
  if (score === TOTAL) msg = '🏆 太完美了！時鐘小達人！';
  else if (score >= 7) msg = '🌟 表現超棒，繼續加油！';
  else if (score >= 4) msg = '👍 很努力喔！再挑戰一次吧！';
  else msg = '💪 多多練習，你一定做得到！';
  feedbackEl.textContent = msg;
  feedbackEl.className = 'feedback good';

  const again = document.createElement('button');
  again.className = 'start-btn';
  again.style.marginTop = '20px';
  again.textContent = '再玩一次 🔄';
  again.onclick = () => location.reload();
  feedbackEl.after(again);
}

optButtons.forEach(btn => btn.addEventListener('click', () => choose(btn)));
prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);

/* ---------------- Audio ---------------- */
let audioCtx = null;
function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function note(freq, start, dur, type = 'triangle', vol = 0.18) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = type;
  osc.frequency.value = freq;
  filter.type = 'lowpass';
  filter.frequency.value = 1400;
  filter.Q.value = 0.7;
  const attack = 0.04, release = Math.min(0.3, dur * 0.6);
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(vol, start + attack);
  gain.gain.setValueAtTime(vol, start + Math.max(attack, dur - release));
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  osc.connect(filter).connect(gain).connect(audioCtx.destination);
  osc.start(start);
  osc.stop(start + dur + 0.05);
}
const F = { C5:523.3, E4:329.6 };
function playDing() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  note(F.C5, t, 0.12, 'triangle', 0.2);
  note(F.E4 * 2, t + 0.1, 0.18, 'triangle', 0.2);
}
function playBuzz() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  note(110, t, 0.3, 'sawtooth', 0.18);
}

/* ---------------- Start ---------------- */
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startOverlay').style.display = 'none';
  ensureCtx();
  buildQuiz();
  renderQuestion();
});

document.addEventListener('contextmenu', e => e.preventDefault());
</script>
<script src="counter.js"></script>
</body>
</html>
